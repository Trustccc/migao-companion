name: 米糕的定时问候

on:
  schedule:
    # 早安打卡 - 每天 10:00 (UTC 时间 02:00)
    - cron: '0 2 * * *'
    # 傍晚打卡 - 每天 18:10 (UTC 时间 10:10)
    - cron: '10 10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  greeting:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行米糕的问候
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python3 migao_companion.py ${{ github.event_name == 'workflow_dispatch' && 'test' || '' }}
